<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stadt erkunden</title>

<link rel="stylesheet" href="aesthetic.css">

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>

<body>

<div class="wrapper">

    <header class="fade">
        <h1>Getting to know the city and feel less like a tourist</h1>
        <p>
            Kind suggestions by a Bavarian.
        </p>
    </header>

    <!-- Karte -->
    <div id="map" class="fade"></div>

    <!-- Optionen -->
    <main class="grid">

        <a href="spaziergang.html" class="card">🌇 Walk</a>
        <a href="eis.html" class="card">🍦 Ice cream</a>
        <a href="buchhandlung.html" class="card">📚 Bookstore</a>
        <a href="biergarten.html" class="card">🍻 Beergarden</a>
        <a href="botanik.html" class="card">🌿 Botanical garden</a>
        <a href="pinakothek.html" class="card">🖼️ Pinakothek</a>
        <a href="plattenladen.html" class="card">🎶 Vinyls</a>
        <a href="johannis.html" class="card">🪩 Pub</a>
        <a href="garten.html" class="card">🫜 Englischer Garten</a>
        <a href="reading.html" class="card">📖 Reading</a>
        <a href="cinema.html" class="card">📽️ Cinema</a>
        <a href="cafe.html" class="card">☕ Café</a>
        <a href="shopping.html" class="card">👖 Shopping</a>

    </main>

</div>

<script>

// Karte initialisieren
var map = L.map('map', {
    zoomControl: false
}).setView([48.147, 11.575], 13);

// Clean Map Tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: ''
}).addTo(map);

// Custom Emoji Icon
function emojiIcon(emoji) {
    return L.divIcon({
        html: `<div style="font-size:20px;">${emoji}</div>`,
        className: '',
        iconSize: [30, 30],
        iconAnchor: [15, 15]
    });
}

// Marker

L.marker([48.139797792307306, 11.57805618948899], { icon: emojiIcon("🌇") })
    .addTo(map)
    .bindPopup("<b>Walk</b><br><a href='spaziergang.html'>open</a>");

L.marker([48.14624786187419, 11.59338598634905], { icon: emojiIcon("🍦") })
    .addTo(map)
    .bindPopup("<b>Ice cream</b><br><a href='eis.html'>open</a>");

L.marker([48.153030759195175, 11.56560156240571], { icon: emojiIcon("📚") })
    .addTo(map)
    .bindPopup("<b>Bookstore</b><br><a href='buchhandlung.html'>open</a>");

L.marker([48.152768275293816, 11.57644116617961], { icon: emojiIcon("🍻") })
    .addTo(map)
    .bindPopup("<b>Beergarden</b><br><a href='biergarten.html'>open</a>");

L.marker([48.16444680863229, 11.50164618483217], { icon: emojiIcon("🌿") })
    .addTo(map)
    .bindPopup("<b>Botanical garden</b><br><a href='botanik.html'>open</a>");

L.marker([48.14719531518435, 11.57225308496006], { icon: emojiIcon("🖼️") })
    .addTo(map)
    .bindPopup("<b>Pinakothek</b><br><a href='pinakothek.html'>open</a>");

L.marker([48.148511295511035, 11.574463429152498], { icon: emojiIcon("🎶") })
    .addTo(map)
    .bindPopup("<b>Vinyls</b><br><a href='plattenladen.html'>open</a>");

</script>
</body>
</html>
